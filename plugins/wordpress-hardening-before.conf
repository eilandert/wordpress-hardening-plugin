# IP-BASED RATE LIMITING FOR WP-LOGIN.PHP
# Lock out an IP after X failed login attempts for Y seconds
# By default: 5 attempts per 60 seconds, whitelist: localhost + RFC 1918

#Check if variable exist and if not, set default (rate limiting: ON by default)
SecRule &TX:wphard.ratelimit_login_enabled "@eq 0" \
  "phase:1,\
  id:9522040,\
  pass,\
  nolog,\
  setvar:tx.wphard.ratelimit_login_enabled=1"

#Check if variable exist and if not, set default (max attempts: 5 by default)
SecRule &TX:wphard.ratelimit_login_attempts "@eq 0" \
  "phase:1,\
  id:9522042,\
  pass,\
  nolog,\
  setvar:tx.wphard.ratelimit_login_attempts=5"

# Note: ratelimit_login_window is intentionally NOT configurable. ModSecurity's
# `expirevar` does not accept macro expansion for its TTL, so the counter window
# is hardcoded to 60 seconds in rule 9522411. A previous version of this plugin
# exposed tx.wphard.ratelimit_login_window as a tunable; it had no effect on
# behaviour, only on the log message, and has been removed to avoid confusion.

# GEOIP-BASED ACCESS CONTROL FOR WP-LOGIN.PHP
# Block wp-login.php for clients whose country is not in the allowed list.
# Country code is read from the CF-IPCountry (Cloudflare) or X-GeoIP-Country
# (nginx geoip2 / generic proxy) request header. No GeoIP database is required
# on the WAF; the upstream proxy must set the header before traffic reaches
# ModSecurity.
# SECURITY NOTE: header values are trusted unconditionally. Only deploy this
# feature behind a proxy (e.g. Cloudflare, nginx with geoip2 module) that sets
# the header and strips any client-supplied value for the same header.

# Default: GeoIP login control disabled
SecRule &TX:wphard.geoip_login_enabled "@eq 0" \
  "phase:1,\
  id:9522046,\
  pass,\
  nolog,\
  setvar:tx.wphard.geoip_login_enabled=0"

# Default: IP reputation blocklist disabled
SecRule &TX:wphard.ip_reputation_enabled "@eq 0" \
  "phase:1,\
  id:9522047,\
  pass,\
  nolog,\
  setvar:tx.wphard.ip_reputation_enabled=0"

# Default: trusted_proxies_enabled OFF. When OFF, X-Forwarded-For is honoured
# regardless of REMOTE_ADDR (backward compatible). When ON, the operator must
# populate plugins/wordpress-hardening-trusted-proxies.data with the CIDRs of
# their real upstream proxies; XFF will then be honoured ONLY when REMOTE_ADDR
# matches that list. Closes the "deployed without a real proxy" footgun.
SecRule &TX:wphard.trusted_proxies_enabled "@eq 0" \
  "phase:1,\
  id:9522050,\
  pass,\
  nolog,\
  setvar:tx.wphard.trusted_proxies_enabled=0"

# Phase 1: Extract the country code from known proxy headers.
# Priority: CF-IPCountry (Cloudflare) > X-GeoIP-Country (generic).
# Result is stored in TX:wphard.geoip_country for use in phase 2.
SecRule REQUEST_HEADERS:CF-IPCountry "@rx ^[A-Za-z]{2}$" \
  "phase:1,\
  id:9522500,\
  pass,\
  nolog,\
  t:lowercase,\
  setvar:tx.wphard.geoip_country=%{MATCHED_VAR}"

SecRule &REQUEST_HEADERS:CF-IPCountry "@eq 0" \
  "phase:1,\
  id:9522501,\
  pass,\
  nolog,\
  chain"
  SecRule REQUEST_HEADERS:X-GeoIP-Country "@rx ^[A-Za-z]{2}$" \
    "t:lowercase,\
    setvar:tx.wphard.geoip_country=%{MATCHED_VAR}"

# ─── TRUSTED CLIENT IP RESOLUTION (phase 1) ─────────────────────────────────
#
# All IP-based decisions (whitelists, rate-limit key, IP-reputation) must use
# ONE consistently-derived client IP. This resolver builds TX:wphard.client_ip:
#
#   1. Default to REMOTE_ADDR (the directly-connected peer).
#   2. If X-Forwarded-For is present (and either the trusted-proxies gate is
#      OFF, or REMOTE_ADDR is in the trusted-proxies list), take ONLY the
#      FIRST hop (the left-most value, i.e. the original client per the XFF
#      spec). Both IPv4 and IPv6 first hops are recognised; a malformed or
#      multi-value header that does not yield a clean first IP is ignored
#      (we keep REMOTE_ADDR).
#
# SECURITY: X-Forwarded-For is still attacker-controlled unless a trusted proxy
# overwrites it. This resolver removes the *multi-value* and *malformed-header*
# bypass classes (an attacker can no longer smuggle a private IP as the 2nd+
# token, nor inject junk), and — crucially — it makes the rate-limit counter
# and every whitelist key off the SAME value, closing the inconsistency where
# whitelists used XFF but the limiter used REMOTE_ADDR. It does NOT, and cannot,
# make a forgeable header trustworthy: deploy behind a proxy that sets/strips
# XFF (Cloudflare, nginx set_real_ip_from, HAProxy). To harden further, pin the
# accepted upstreams with tx.wphard.trusted_proxies in config.
SecAction \
  "id:9522060,\
  phase:1,\
  pass,\
  nolog,\
  setvar:tx.wphard.client_ip=%{REMOTE_ADDR}"

# Trusted-proxy gate. Default tx.wphard.xff_trusted=1 (XFF honoured), then if
# tx.wphard.trusted_proxies_enabled is ON, downgrade to 0 unless REMOTE_ADDR
# is in the trusted_proxies data file. This means an operator who turns the
# feature ON gets explicit pinning; everyone else gets the prior behaviour.
SecAction \
  "id:9522064,\
  phase:1,\
  pass,\
  nolog,\
  setvar:tx.wphard.xff_trusted=1"

SecRule TX:wphard.trusted_proxies_enabled "@eq 1" \
  "id:9522065,\
  phase:1,\
  pass,\
  nolog,\
  chain"
  SecRule REMOTE_ADDR "!@ipMatchFromFile wordpress-hardening-trusted-proxies.data" \
    "setvar:tx.wphard.xff_trusted=0"

# First hop of XFF only: ^\s*<ipv4> followed by a clean terminator (comma,
# whitespace, or end-of-string). Capture group 1 is the candidate. The trailing
# (?=...) lookahead rejects malformed first hops like "1.2.3.4junk" — previously
# the regex would silently accept them and set client_ip to the prefix.
# Gated on xff_trusted so an operator with trusted_proxies_enabled=1 cannot be
# fooled by XFF from a non-upstream peer.
SecRule TX:wphard.xff_trusted "@eq 1" \
  "id:9522061,\
  phase:1,\
  pass,\
  nolog,\
  chain"
  SecRule REQUEST_HEADERS:X-Forwarded-For \
    "@rx ^\s*((?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])(?:\.(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])){3})(?=$|[\s,])" \
    "capture,setvar:tx.wphard.client_ip=%{TX.1}"

# IPv6 first hop of XFF. Pattern grammar is intentionally permissive (hex
# groups, ::, IPv4-mapped tail) but bounded — every alternative is anchored
# to ^\s* and stops at a [\s,] / end-of-string terminator. Also gated on
# xff_trusted.
SecRule TX:wphard.xff_trusted "@eq 1" \
  "id:9522062,\
  phase:1,\
  pass,\
  nolog,\
  chain"
  SecRule REQUEST_HEADERS:X-Forwarded-For \
    "@rx ^\s*(\[?(?:(?:[0-9A-Fa-f]{1,4}:){1,7}[0-9A-Fa-f]{1,4}|(?:[0-9A-Fa-f]{1,4}:){1,7}:|::(?:[0-9A-Fa-f]{1,4}:){0,6}[0-9A-Fa-f]{1,4}|::1?|(?:[0-9A-Fa-f]{1,4}:){1,6}(?:\d{1,3}\.){3}\d{1,3})\]?)(?=$|[\s,])" \
    "capture,setvar:tx.wphard.client_ip=%{TX.1}"

# Phase-1 helper: classify the resolved client_ip as "private" (loopback +
# RFC 1918 for v4, plus IPv6 loopback ::1 and Unique Local fc00::/7) and store
# the result in tx.wphard.client_is_private. This collapses the six identical
# whitelist regexes into a single check, and gives every group an IPv6-aware
# private-network test for free.
SecRule TX:wphard.client_ip "@rx ^(?:127\.[0-9]+\.[0-9]+\.[0-9]+|10\.[0-9]+\.[0-9]+\.[0-9]+|172\.(?:1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+|192\.168\.[0-9]+\.[0-9]+|\[?::1\]?|\[?[fF][cCdD][0-9A-Fa-f]{2}:.*\]?)$" \
  "id:9522063,\
  phase:1,\
  pass,\
  nolog,\
  setvar:tx.wphard.client_is_private=1"
# ============================================================================
# INFO-LEAK FILE HARD-BLOCK (phase:1)
# ----------------------------------------------------------------------------
# Block well-known WordPress info-leak paths in phase:1 so the rule fires
# *before* any upstream location-block redirect (which would otherwise 302
# the probe to a confusing target and bypass ModSec phase:2). These paths
# carry no legitimate traffic for an installed site:
#   /readme.html, /license.txt          (WordPress version disclosure)
#   /.user.ini                          (PHP per-directory config probe)
#   /wp-admin/install.php               (installer — completed installs only)
#   /wp-admin/setup-config.php          (installer step 2)
#   /wp-includes/wlwmanifest.xml        (Windows Live Writer manifest)
#   /wp-content/debug.log               (WP_DEBUG_LOG output)
# Returns 403 deterministically; respects the block_info_leak_files toggle.
# ============================================================================
SecRule TX:wphard.block_info_leak_files "@eq 1" \
  "id:9522100,\
  phase:1,\
  chain,\
  t:lowercase,t:normalizePath,\
  tag:'wordpress',\
  tag:'info-leak',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'NOTICE',\
  ver:'WPHARD/1.0.0',\
  block,\
  logdata:'Request URI %{REQUEST_URI}',\
  msg:'Wordpress hardening: blocked info-leak path',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
  SecRule REQUEST_URI "@rx ^/(?:readme\.html|license\.txt|\.user\.ini|wp-admin/(?:install|setup-config)\.php|wp-includes/wlwmanifest\.xml|wp-content/debug\.log)(?:$|\?)"

# ----------------------------------------------------------------------------
# CVE-2018-6389: /wp-admin/load-scripts.php and /wp-admin/load-styles.php
# accept a ?load=handle1,handle2,... parameter and concatenate the listed
# core JS/CSS files. Unauthenticated by design. An attacker can request
# every registered handle in one URL to force WordPress to load ~all of
# wp-includes, exhausting CPU/memory. Block when load= is suspiciously long
# (>= ~10 handles ≈ length > 80 chars including commas) — legitimate WP
# admin pages chain a few handles at most.
# ----------------------------------------------------------------------------
SecRule TX:wphard.block_load_scripts_dos "@eq 1" \
  "id:9522112,\
  phase:1,\
  chain,\
  t:lowercase,t:normalizePath,\
  tag:'wordpress',\
  tag:'cve-2018-6389',\
  tag:'dos',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'WARNING',\
  ver:'WPHARD/1.0.0',\
  block,\
  logdata:'Request URI %{REQUEST_URI}',\
  msg:'Wordpress hardening: CVE-2018-6389 load-scripts/load-styles DoS attempt',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
  SecRule REQUEST_URI "@rx ^/wp-admin/load-(?:scripts|styles)\.php\?.*\bload(?:%5B%5D|\[\])?=[^&]{80,}"

# ----------------------------------------------------------------------------
# Block access to VCS metadata and dotfile secrets.
#   /.env, /.env.local, /.env.*       (Laravel/CI conventions creeping into WP)
#   /.git/, /.svn/, /.hg/, /.bzr/     (repo metadata exposing source+history)
#   /.htpasswd, /.htaccess (in body)  (already in 9522206 but we want phase:1)
# ----------------------------------------------------------------------------
SecRule TX:wphard.block_vcs_paths "@eq 1" \
  "id:9522113,\
  phase:1,\
  chain,\
  t:lowercase,t:normalizePath,\
  tag:'wordpress',\
  tag:'info-leak',\
  tag:'vcs-metadata',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'NOTICE',\
  ver:'WPHARD/1.0.0',\
  block,\
  logdata:'Request URI %{REQUEST_URI}',\
  msg:'Wordpress hardening: blocked VCS / dotfile probe',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
  SecRule REQUEST_URI "@rx (?:^|/)(?:\.env(?:\.[a-z0-9_-]+)?|\.git(?:/|$|ignore|attributes|modules|config|hooks)|\.svn(?:/|$|/entries|/wc\.db)|\.hg(?:/|$)|\.bzr(?:/|$)|\.ds_store|\.htpasswd)(?:$|/|\?)"

# ----------------------------------------------------------------------------
# Block wp-config.php backup variants. The base 9522206 regex catches some
# (.bak/.orig/.swp) but misses .save, .old, .php~, .php.txt, .php.bak, and
# numeric backups (wp-config.php.1, .2, etc). All of these would serve the
# raw file as text since they aren't .php anymore.
# ----------------------------------------------------------------------------
SecRule TX:wphard.block_wpconfig_backups "@eq 1" \
  "id:9522114,\
  phase:1,\
  chain,\
  t:lowercase,t:normalizePath,\
  tag:'wordpress',\
  tag:'info-leak',\
  tag:'config-leak',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'CRITICAL',\
  ver:'WPHARD/1.0.0',\
  block,\
  logdata:'Request URI %{REQUEST_URI}',\
  msg:'Wordpress hardening: wp-config backup variant probe',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"
  SecRule REQUEST_URI "@rx ^/wp-config(?:\.php)?(?:\.(?:bak|backup|save|old|new|orig|tmp|swp|swo|txt|inc|dist|sample|copy|[0-9]+)|~)(?:$|\?)"

# ----------------------------------------------------------------------------
# Optional: block plugin/theme version disclosure via readme.txt and
# style.css headers. Attackers scrape these to map installed-version → CVE.
# Disabled by default because some legitimate tooling fetches readme.txt
# (wp-cli, update checkers) — enable only behind a tight allowlist or when
# you accept that minor breakage.
# ----------------------------------------------------------------------------
SecRule TX:wphard.block_plugin_readme "@eq 1" \
  "id:9522115,\
  phase:1,\
  chain,\
  t:lowercase,t:normalizePath,\
  tag:'wordpress',\
  tag:'info-leak',\
  tag:'version-disclosure',\
  tag:'paranoia-level/2',\
  accuracy:'8',\
  maturity:'1',\
  severity:'NOTICE',\
  ver:'WPHARD/1.0.0',\
  block,\
  logdata:'Request URI %{REQUEST_URI}',\
  msg:'Wordpress hardening: plugin/theme version disclosure probe',\
  setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}'"
  SecRule REQUEST_URI "@rx ^/wp-content/(?:plugins|themes|mu-plugins)/[^/]+/(?:readme(?:\.txt|\.md)|changelog\.txt|license\.txt)(?:$|\?)"

# ----------------------------------------------------------------------------
# PHP stream wrappers in any request argument — classic LFI/RFI vector.
# php://input, php://filter, data://, expect://, file://, phar://, glob://,
# zip://. No legitimate WordPress request should contain these in a URL arg
# or POST body. Match across ARGS and REQUEST_URI (URL-decoded once by ModSec).
# ----------------------------------------------------------------------------
SecRule TX:wphard.block_php_wrappers "@eq 1" \
  "id:9522116,\
  phase:2,\
  chain,\
