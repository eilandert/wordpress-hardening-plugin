# GEOIP-BASED ACCESS CONTROL FOR WP-LOGIN.PHP
# Block wp-login.php for clients whose country is not in the allowed list.
# Country code is read from the CF-IPCountry (Cloudflare) or X-GeoIP-Country
# (nginx geoip2 / generic proxy) request header. No GeoIP database is required
# on the WAF; the upstream proxy must set the header before traffic reaches
# ModSecurity.
# SECURITY NOTE: header values are trusted unconditionally. Only deploy this
# feature behind a proxy (e.g. Cloudflare, nginx with geoip2 module) that sets
# the header and strips any client-supplied value for the same header.

# Default: GeoIP login control disabled
SecRule &TX:wphard.geoip_login_enabled "@eq 0" \
  "phase:1,\
  id:9522046,\
  pass,\
  nolog,\
  setvar:tx.wphard.geoip_login_enabled=0"

# Default: IP reputation blocklist disabled
SecRule &TX:wphard.ip_reputation_enabled "@eq 0" \
  "phase:1,\
  id:9522047,\
  pass,\
  nolog,\
  setvar:tx.wphard.ip_reputation_enabled=0"

# Phase 1: Extract the country code from known proxy headers.
# Priority: CF-IPCountry (Cloudflare) > X-GeoIP-Country (generic).
# Result is stored in TX:wphard.geoip_country for use in phase 2.
SecRule REQUEST_HEADERS:CF-IPCountry "@rx ^[A-Za-z]{2}$" \
  "phase:1,\
  id:9522500,\
  pass,\
  nolog,\
  t:uppercase,\
  setvar:tx.wphard.geoip_country=%{MATCHED_VAR}"

SecRule &REQUEST_HEADERS:CF-IPCountry "@eq 0" \
  "phase:1,\
  id:9522501,\
  pass,\
  nolog,\
  chain"
  SecRule REQUEST_HEADERS:X-GeoIP-Country "@rx ^[A-Za-z]{2}$" \
    "t:uppercase,\
    setvar:tx.wphard.geoip_country=%{MATCHED_VAR}"

# Check if xmlrpc should be blocked and if not, skip.
SecRule &TX:wphard.block_xmlrpc "@eq 0" \
  "id:9522101,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_XMLRPC"

# Skip if client IP is whitelisted (localhost + RFC 1918).
# Prefers X-Forwarded-For when present (for proxied requests), otherwise REMOTE_ADDR.
# SECURITY: X-Forwarded-For is trusted unconditionally here. Only deploy this
# plugin behind a reverse proxy that overwrites the header, or in front of
# nginx configured with set_real_ip_from for the trusted upstreams. Otherwise
# an attacker can bypass the whitelist by spoofing the header.
SecRule REQUEST_HEADERS:X-Forwarded-For "@rx ^(127\.[0-9]+\.[0-9]+\.[0-9]+|10\.[0-9]+\.[0-9]+\.[0-9]+|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+|192\.168\.[0-9]+\.[0-9]+)$" \
  "id:9522150,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_XMLRPC"

SecRule &REQUEST_HEADERS:X-Forwarded-For "@eq 0" \
  "id:9522153,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_XMLRPC,\
  chain"
  SecRule REMOTE_ADDR "@rx ^(127\.[0-9]+\.[0-9]+\.[0-9]+|10\.[0-9]+\.[0-9]+\.[0-9]+|172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+|192\.168\.[0-9]+\.[0-9]+)$"

SecMarker "BEGIN_WPHARD_XMLRPC"

SecRule REQUEST_FILENAME "^/xmlrpc\.php" \
  "id:9522102,\
  phase:2,\
  t:lowercase,t:normalizePath,t:trim,\
  tag:'wordpress',\
