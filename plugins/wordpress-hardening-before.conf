# ─── Rule 5: Block directory traversal in wp-content/uploads ─────────────────

SecRule TX:wphard.block_upload_traversal "@eq 0" \
  "phase:2,\
  id:9522306,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_UPLOAD_TRAVERSAL"

SecMarker "BEGIN_WPHARD_BLOCK_UPLOAD_TRAVERSAL"

# Bypass fix: previously t:normalizePath collapsed "../" BEFORE the regex (so the
# traversal it was trying to detect was already gone) and there was no URL
# decoding, so "%2e%2e" bypassed it entirely. We now urlDecodeUni (catches
# %2e%2e and %252e double-encoding via the first decode) and deliberately do
# NOT normalizePath, so the ".." traversal token is still visible to the
# regex. Pattern tightened off ".*" to avoid backtracking.
SecRule REQUEST_URI "@rx /wp-content/uploads/[^?]*\.\." \
  "id:9522307,\
  phase:2,\
  t:lowercase,t:urlDecodeUni,t:trim,\
  tag:'wordpress',\
  tag:'upload-traversal',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'NOTICE',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Request URI %{REQUEST_URI}',\
  msg:'Wordpress hardening: directory traversal in uploads path blocked',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_BLOCK_UPLOAD_TRAVERSAL"

# ─── Rule 6: Block null byte injection attempts ───────────────────────────────

SecRule TX:wphard.block_null_bytes "@eq 0" \
  "phase:2,\
  id:9522308,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_NULL_BYTES"

SecMarker "BEGIN_WPHARD_BLOCK_NULL_BYTES"

# PL2 rule — only enforce it when the configured CRS detection
# paranoia level is >= 2 (default CRS PL is 1). Without this gate the
# paranoia-level/2 tag was cosmetic and the rule always ran.
SecRule TX:detection_paranoia_level "@lt 2" \
  "id:9522318,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_NULL_BYTES"

# Double-decode fix: with a single urlDecodeUni, "%00" is already a real null so the
# "%00" literal was dead and a DOUBLE-encoded "%2500" slipped through. We now
# decode twice (catches %2500 -> %00 -> NUL) and also match the raw control
# byte plus a still-encoded "%00"/unicode form for defence in depth.
SecRule REQUEST_URI|ARGS_NAMES|ARGS "@rx %00|%u0000|\x00" \
  "id:9522309,\
  phase:2,\
  t:lowercase,t:urlDecodeUni,t:urlDecodeUni,\
  tag:'wordpress',\
  tag:'null-byte',\
  tag:'paranoia-level/2',\
  accuracy:'9',\
  maturity:'1',\
  severity:'CRITICAL',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Matched Data: %{MATCHED_VAR} in %{MATCHED_VAR_NAME}',\
  msg:'Wordpress hardening: null byte injection attempt blocked',\
  setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_BLOCK_NULL_BYTES"

