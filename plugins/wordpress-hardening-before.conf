# PERFORMANCE FAST-PATH: a typical WordPress page pulls dozens of static
# assets. Each otherwise runs ~7 REQUEST_FILENAME regexes (9522200-9522206).
# This single cheap, anchored, suffix-only check short-circuits the whole
# file-access group for INERT media/asset extensions ONLY.
#
# SECURITY: the skipped extensions are deliberately a closed allow-list of
# non-executable types that NO rule in the group targets (verified: none of
# 9522200-9522206 / files.data reference these). PHP is never in this list, so
# a ".php" request can never use the fast-path. Sensitive types the group
# blocks (.sql .bak .conf .ini .log .git .html-in-uploads ...) are NOT listed,
# so this does not reopen any of those exposures.
SecRule REQUEST_FILENAME "@rx \.(?:jpe?g|png|gif|webp|svg|ico|css|js|map|woff2?|ttf|eot|avif|mp4|webm)$" \
  "id:9522199,\
  phase:2,\
  t:lowercase,t:normalizePath,t:trim,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_STATIC_FILE_RULES"

# No direct access to .php files except index.php / a real top-level
# /wp-admin/ / xmlrpc / wp-cron / wp-login.
#
# Backtracking fix: the old single regex used a negative lookahead with ".*" twice,
# which backtracks badly on long crafted URIs. This is now a chain: a cheap
# anchored "\.php$" starter, then a NEGATIVE rule that only matches when the
# path is NOT an allowed form. No catastrophic backtracking.
#
# The allow-list for wp-admin is anchored to the START of the path
# ("^/wp-admin/"), so an attacker-created directory like
# /wp-content/uploads/wp-admin/shell.php is NO LONGER allowed.
SecRule REQUEST_FILENAME "@rx \.php$" \
  "id:9522200,\
  phase:2,\
  t:lowercase,t:normalizePath,t:trim,\
  tag:'wordpress',\
  tag:'direct-access',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'NOTICE',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Request Filename %{REQUEST_FILENAME}',\
  msg:'Wordpress hardening: attempt to access php files other than index.php',\
  chain"
  SecRule REQUEST_FILENAME "!@rx ^(?:/wp-admin/|/(?:index|xmlrpc|wp-cron|wp-login|wp-comments-post|wp-signup)\.php$)" \
    "t:lowercase,t:normalizePath,t:trim,\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

# No direct access to these files (PL1)
SecRule REQUEST_FILENAME "@pmFromFile wordpress-hardening-files.data" \
  "id:9522202,\
  phase:2,\
  t:lowercase,t:normalizePath,t:trim,\
  tag:'wordpress',\
  tag:'direct-access',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'NOTICE',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Request Filename %{REQUEST_FILENAME}',\
  msg:'Wordpress hardening: direct file access attempt on files that dont need that',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

# Don't allow other script languages. (PL2)
# PL2 rule — skip unless detection paranoia level >= 2.
SecRule TX:detection_paranoia_level "@lt 2" \
  "id:9522208,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_OTHER_INTERPRETERS"

