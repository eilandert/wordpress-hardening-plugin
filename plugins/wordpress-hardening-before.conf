# rule-ID inventory and chained-rule structure stay stable for CI.
SecRule TX:wphard.client_is_private "@eq 1" \
  "id:9522150,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_XMLRPC"

SecAction "id:9522153,phase:2,pass,nolog"

