  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'NOTICE',\
  ver:'WPHARD/1.0.0',\
  block,\
  capture,\
  logdata:'Request Filename %{REQUEST_FILENAME}',\
  msg:'Wordpress hardening: xmlrpc.php access attempt',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_XMLRPC"

