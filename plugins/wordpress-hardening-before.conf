SecRule REQUEST_FILENAME "@rx \.(sql\.gz|sql\.bz2|sql\.zip|mysqldump|dump\.sql)($|/)?" \
  "id:9522305,\
  phase:2,\
  t:lowercase,t:normalizePath,t:trim,\
  tag:'wordpress',\
  tag:'database-files',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'NOTICE',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Request Filename %{REQUEST_FILENAME}',\
  msg:'Wordpress hardening: access to compressed database export blocked',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_BLOCK_DB_FILES"

# ─── Rule 5: Block directory traversal in wp-content/uploads ─────────────────

SecRule TX:wphard.block_upload_traversal "@eq 0" \
  "phase:2,\
  id:9522306,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_UPLOAD_TRAVERSAL"

SecMarker "BEGIN_WPHARD_BLOCK_UPLOAD_TRAVERSAL"

# Bypass fix: previously t:normalizePath collapsed "../" BEFORE the regex (so the
# traversal it was trying to detect was already gone) and there was no URL
# decoding, so "%2e%2e" bypassed it entirely. We now urlDecodeUni (catches
# %2e%2e and %252e double-encoding via the first decode) and deliberately do
# NOT normalizePath, so the ".." traversal token is still visible to the
# regex. Pattern tightened off ".*" to avoid backtracking.
SecRule REQUEST_URI "@rx /wp-content/uploads/[^?]*\.\." \
  "id:9522307,\
  phase:2,\
  t:lowercase,t:urlDecodeUni,t:trim,\
  tag:'wordpress',\
  tag:'upload-traversal',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'NOTICE',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Request URI %{REQUEST_URI}',\
  msg:'Wordpress hardening: directory traversal in uploads path blocked',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_BLOCK_UPLOAD_TRAVERSAL"

# ─── Rule 6: Block null byte injection attempts ───────────────────────────────

SecRule TX:wphard.block_null_bytes "@eq 0" \
  "phase:2,\
  id:9522308,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_NULL_BYTES"

SecMarker "BEGIN_WPHARD_BLOCK_NULL_BYTES"

# PL2 rule — only enforce it when the configured CRS detection
# paranoia level is >= 2 (default CRS PL is 1). Without this gate the
# paranoia-level/2 tag was cosmetic and the rule always ran.
SecRule TX:detection_paranoia_level "@lt 2" \
  "id:9522318,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_NULL_BYTES"

# Double-decode fix: with a single urlDecodeUni, "%00" is already a real null so the
# "%00" literal was dead and a DOUBLE-encoded "%2500" slipped through. We now
# decode twice (catches %2500 -> %00 -> NUL) and also match the raw control
# byte plus a still-encoded "%00"/unicode form for defence in depth.
SecRule REQUEST_URI|ARGS_NAMES|ARGS "@rx %00|%u0000|\x00" \
  "id:9522309,\
  phase:2,\
  t:lowercase,t:urlDecodeUni,t:urlDecodeUni,\
  tag:'wordpress',\
  tag:'null-byte',\
  tag:'paranoia-level/2',\
  accuracy:'9',\
  maturity:'1',\
  severity:'CRITICAL',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Matched Data: %{MATCHED_VAR} in %{MATCHED_VAR_NAME}',\
  msg:'Wordpress hardening: null byte injection attempt blocked',\
  setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_BLOCK_NULL_BYTES"

# ─── Rule 7: Block known security scanner user agents ────────────────────────

SecRule TX:wphard.block_scanners "@eq 0" \
  "phase:2,\
  id:9522310,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_SCANNERS"

SecMarker "BEGIN_WPHARD_BLOCK_SCANNERS"

# PL2 rule — only enforce at detection paranoia level >= 2.
SecRule TX:detection_paranoia_level "@lt 2" \
  "id:9522319,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_SCANNERS"

SecRule REQUEST_HEADERS:User-Agent "@pmFromFile wordpress-hardening-scanners.data" \
  "id:9522311,\
  phase:2,\
  t:lowercase,\
  tag:'wordpress',\
  tag:'scanner',\
  tag:'paranoia-level/2',\
  accuracy:'7',\
  maturity:'1',\
  severity:'WARNING',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'User-Agent: %{REQUEST_HEADERS.User-Agent}',\
  msg:'Wordpress hardening: known security scanner user agent blocked',\
  setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_BLOCK_SCANNERS"

# ─── Rule 8: Block XDebug probes and debug endpoint access ───────────────────

SecRule TX:wphard.block_debug_probes "@eq 0" \
  "phase:2,\
  id:9522312,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_DEBUG_PROBES"

SecMarker "BEGIN_WPHARD_BLOCK_DEBUG_PROBES"

# "phpinfo" was previously a free substring match — any post slug containing
# the word triggered the block. Anchor it to either an exact arg-name match or
# a /phpinfo(.php)? URI segment so legitimate content slugs are not blocked.
SecRule REQUEST_URI|ARGS_NAMES "@rx XDEBUG_SESSION(?:_(?:START|STOP))?|XDEBUG_PROFILE|XDEBUG_TRACE|(?:^|/)phpinfo(?:\.php)?(?:$|[/?])|(?:^|&)phpinfo(?:=|$)" \
  "id:9522313,\
  phase:2,\
  t:lowercase,t:urlDecodeUni,\
  tag:'wordpress',\
  tag:'debug-probe',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'NOTICE',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Matched Data: %{MATCHED_VAR} in %{MATCHED_VAR_NAME}',\
  msg:'Wordpress hardening: debug probe or XDebug activation attempt blocked',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_BLOCK_DEBUG_PROBES"

# ─── Rule 9: Block code injection in wp-login.php POST parameters ─────────────

SecRule TX:wphard.block_login_injection "@eq 0" \
  "phase:2,\
  id:9522314,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_LOGIN_INJECTION"

SecMarker "BEGIN_WPHARD_BLOCK_LOGIN_INJECTION"

SecRule REQUEST_FILENAME "@endsWith /wp-login.php" \
  "id:9522315,\
  phase:2,\
  t:lowercase,t:normalizePath,t:trim,\
  tag:'wordpress',\
  tag:'login-injection',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'CRITICAL',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Matched injection in login param: %{MATCHED_VAR}',\
  msg:'Wordpress hardening: code injection detected in wp-login.php parameters',\
  chain"
  SecRule ARGS:log|ARGS:pwd "@rx (?:<[^>]+>|script|alert\(|eval\(|base64_decode|onload=|onerror=)" \
    "t:lowercase,t:htmlEntityDecode,t:urlDecodeUni,\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_BLOCK_LOGIN_INJECTION"

# ─── Rule 10: Block dangerous wp-admin endpoints ──────────────────────────────

SecRule TX:wphard.block_dangerous_admin "@eq 0" \
  "phase:2,\
  id:9522316,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_DANGEROUS_ADMIN"

SecMarker "BEGIN_WPHARD_BLOCK_DANGEROUS_ADMIN"

# PL2 rule — only enforce at detection paranoia level >= 2.
# install.php and setup-config.php are already hard-blocked in phase:1 by 9522100
# (info-leak rule), so this rule only needs to cover upgrade.php and wp-activate.php.
SecRule TX:detection_paranoia_level "@lt 2" \
  "id:9522320,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_BLOCK_DANGEROUS_ADMIN"

SecRule REQUEST_FILENAME "@rx ^/wp-admin/(upgrade|wp-activate)\.php" \
  "id:9522317,\
  phase:2,\
  t:lowercase,t:normalizePath,t:trim,\
  tag:'wordpress',\
  tag:'dangerous-admin',\
  tag:'paranoia-level/2',\
  accuracy:'9',\
  maturity:'1',\
  severity:'NOTICE',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Request Filename %{REQUEST_FILENAME}',\
  msg:'Wordpress hardening: access to dangerous wp-admin endpoint blocked',\
  setvar:'tx.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_BLOCK_DANGEROUS_ADMIN"

# ─── RULE GROUP: IP-BASED RATE LIMITING FOR WP-LOGIN.PHP ────────────────────

# Rate limiting works by:
# 1. Checking if rate limiting is enabled
# 2. Checking if the request IP is whitelisted (skip if yes)
# 3. Incrementing a per-IP counter on each login attempt
# 4. Blocking if counter >= configured threshold
# 5. Counter expires after configured window (in seconds)
#
# Note: We track ALL login attempts, not just failures. This is necessary because
# ModSecurity cannot reliably distinguish failed logins in phase 2 (before response).
# This approach prevents both brute force AND spam against the login endpoint.

# Check if rate limiting is enabled, if not skip all rate limiting rules
SecRule TX:wphard.ratelimit_login_enabled "@eq 0" \
  "phase:2,\
  id:9522400,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_RATELIMIT_LOGIN"

SecMarker "BEGIN_WPHARD_RATELIMIT_LOGIN"

# Skip rate limiting for whitelisted client IPs (localhost + RFC 1918), using
# the resolved trusted client IP (consistent with the counter key below).
SecRule TX:wphard.client_is_private "@eq 1" \
  "id:9522410,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_RATELIMIT_LOGIN"

SecAction "id:9522413,phase:2,pass,nolog"

# Bind the per-IP collection to the RESOLVED trusted client IP, not the
# implicit REMOTE_ADDR. Previously the counter keyed on
# REMOTE_ADDR (the proxy IP behind a CDN) so one shared proxy meant a global
# 5-strike lockout (DoS) AND an XFF-rotating attacker was uncounted. Keying on
# tx.wphard.client_ip makes the limiter count the same identity the whitelist
# trusts. initcol must run before any ip: read/write.
#
# Perf gate: initcol persists the IP collection to disk (SDBM) on every call.
# Previously this ran on EVERY phase-2 request when rate limiting was enabled
# (every static asset, every page view). The chain below restricts initcol to
# the only request shape the limiter actually keys on — POST to /wp-login.php
# — so the dominant request path pays zero collection cost.
SecRule REQUEST_METHOD "@streq POST" \
  "id:9522414,\
  phase:2,\
  pass,\
  nolog,\
  t:none,\
  chain"
  SecRule REQUEST_FILENAME "@endsWith /wp-login.php" \
    "t:lowercase,t:normalizePath,\
    initcol:ip=%{tx.wphard.client_ip}"

# Track login attempts: increment the per-client counter on POST to wp-login.
# expirevar cannot take a macro TTL, so we dispatch on the configured window
# value to one of five well-known buckets (30/60/120/300/600 seconds). Any
# other value falls back to 60s. This honours tx.wphard.ratelimit_login_window
# end-to-end instead of silently ignoring it.
SecRule REQUEST_METHOD "@streq POST" \
  "id:9522411,\
  phase:2,\
  nolog,\
  pass,\
  t:none,\
  tag:'wordpress',\
  tag:'rate-limit',\
  chain"
  SecRule REQUEST_FILENAME "@endsWith /wp-login.php" \
    "t:lowercase,t:normalizePath,\
    setvar:ip.login_attempts=+1,\
    capture"

# Window dispatcher. Each @streq is a literal so no macro is needed; the
# rule fires only when the configured window matches that bucket, sets the
# expirevar accordingly, and skips the rest. The trailing SecAction handles
# the 60s default + any unknown value.
SecRule TX:wphard.ratelimit_login_window "@streq 30" \
  "id:9522416,phase:2,pass,nolog,expirevar:ip.login_attempts=30,skipAfter:END_WPHARD_WINDOW_DISPATCH"
SecRule TX:wphard.ratelimit_login_window "@streq 120" \
  "id:9522417,phase:2,pass,nolog,expirevar:ip.login_attempts=120,skipAfter:END_WPHARD_WINDOW_DISPATCH"
SecRule TX:wphard.ratelimit_login_window "@streq 300" \
  "id:9522418,phase:2,pass,nolog,expirevar:ip.login_attempts=300,skipAfter:END_WPHARD_WINDOW_DISPATCH"
SecRule TX:wphard.ratelimit_login_window "@streq 600" \
  "id:9522419,phase:2,pass,nolog,expirevar:ip.login_attempts=600,skipAfter:END_WPHARD_WINDOW_DISPATCH"
SecAction \
  "id:9522420,phase:2,pass,nolog,expirevar:ip.login_attempts=60"
SecMarker "END_WPHARD_WINDOW_DISPATCH"

# Block if login attempts exceed threshold for this client IP
# RFC 6585 §4: rate-limit responses SHOULD use 429 Too Many Requests, not the
# generic CRS-default deny status (403). We deny directly with status:429 so
# callers can distinguish "you are throttled" from "request denied" and apply
# backoff. The anomaly score is still incremented for log correlation.
SecRule IP:login_attempts "@ge %{tx.wphard.ratelimit_login_attempts}" \
  "id:9522412,\
  phase:2,\
  t:lowercase,t:normalizePath,\
  tag:'wordpress',\
  tag:'rate-limit',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'WARNING',\
  ver:'WPHARD/1.1.0',\
  deny,status:429,\
  capture,\
  setenv:'wphard_retry_after=%{tx.wphard.ratelimit_login_window}',\
  logdata:'Client IP: %{tx.wphard.client_ip}, Attempts: %{IP:login_attempts}, Threshold: %{tx.wphard.ratelimit_login_attempts}, Window: %{tx.wphard.ratelimit_login_window}s',\
  msg:'Wordpress hardening: wp-login.php rate limit exceeded for IP',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_RATELIMIT_LOGIN"

# ─── RULE GROUP: GEOIP-BASED ACCESS CONTROL FOR WP-LOGIN.PHP ────────────────
#
# How it works:
# 1. The upstream proxy (Cloudflare, nginx geoip2, etc.) sets CF-IPCountry or
#    X-GeoIP-Country header with the client's 2-letter ISO country code.
# 2. Phase 1 rules (9522500-9522501) extract the code into TX:wphard.geoip_country.
# 3. Phase 2: if the feature is enabled, any POST to /wp-login.php whose country
#    is NOT listed in wordpress-hardening-login-countries.data is blocked.
# 4. Requests from whitelisted IPs (localhost + RFC 1918) bypass the check.
# 5. Requests without a country header bypass the check (fail-open).

# Gate: skip all GeoIP rules if feature is disabled
SecRule TX:wphard.geoip_login_enabled "@eq 0" \
  "id:9522503,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_GEOIP_LOGIN"

# Gate: skip if no country code was extracted (no GeoIP header present)
SecRule &TX:wphard.geoip_country "@eq 0" \
  "id:9522504,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_GEOIP_LOGIN"

# Gate: only apply to /wp-login.php
SecRule REQUEST_FILENAME "!@endsWith /wp-login.php" \
  "id:9522505,\
  phase:2,\
  pass,\
  nolog,\
  t:lowercase,t:normalizePath,\
  skipAfter:END_WPHARD_GEOIP_LOGIN"

# Whitelist: skip GeoIP check for the resolved trusted client IP if it is
# localhost or RFC 1918.
SecRule TX:wphard.client_is_private "@eq 1" \
  "id:9522506,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_GEOIP_LOGIN"

SecAction "id:9522507,phase:2,pass,nolog"

# Allow: skip if country code is in the allowed-countries list
SecRule TX:wphard.geoip_country "@pmFromFile wordpress-hardening-login-countries.data" \
  "id:9522508,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_GEOIP_LOGIN"

SecMarker "BEGIN_WPHARD_GEOIP_LOGIN"

# Block: country not in the allowed list
SecRule TX:wphard.geoip_country "@rx ^[A-Za-z]{2}$" \
  "id:9522510,\
  phase:2,\
  t:none,\
  tag:'wordpress',\
  tag:'geoip',\
  tag:'paranoia-level/1',\
  accuracy:'9',\
  maturity:'1',\
  severity:'WARNING',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Country: %{tx.wphard.geoip_country}, URI: %{REQUEST_URI}',\
  msg:'Wordpress hardening: wp-login.php blocked for country %{tx.wphard.geoip_country}',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

SecMarker "END_WPHARD_GEOIP_LOGIN"

# ─── RULE GROUP: IP REPUTATION BLOCKLIST ────────────────────────────────────
#
# Blocks all requests from IPs listed in wordpress-hardening-ip-reputation.data.
# Supports individual addresses and CIDR ranges (e.g. 198.51.100.0/24).
# The client IP is taken from X-Forwarded-For (when present) or REMOTE_ADDR.
# Loopback (127.0.0.0/8) and RFC 1918 private ranges are always whitelisted.
#
# SECURITY NOTE: X-Forwarded-For is trusted unconditionally. Deploy this feature
# only behind a proxy (Cloudflare, nginx proxy_pass, HAProxy, etc.) that sets
# or overwrites X-Forwarded-For. Never use on a server with direct internet access.

# Gate: skip all IP reputation rules if feature is disabled
SecRule TX:wphard.ip_reputation_enabled "@eq 0" \
  "id:9522600,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_IP_REPUTATION"

# Whitelist: skip if the resolved trusted client IP is loopback or RFC 1918.
SecRule TX:wphard.client_is_private "@eq 1" \
  "id:9522601,\
  phase:2,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_IP_REPUTATION"

SecAction "id:9522602,phase:2,pass,nolog"

SecMarker "BEGIN_WPHARD_IP_REPUTATION"

# Block: the resolved trusted client IP matches the reputation blocklist.
# One rule now covers both the XFF and no-XFF cases because client_ip is
# already resolved (first XFF hop, else REMOTE_ADDR) in phase 1.
SecRule TX:wphard.client_ip "@ipMatchFromFile wordpress-hardening-ip-reputation.data" \
  "id:9522603,\
  phase:2,\
  t:none,\
  tag:'wordpress',\
  tag:'ip-reputation',\
  tag:'paranoia-level/1',\
  accuracy:'8',\
  maturity:'1',\
  severity:'CRITICAL',\
  ver:'WPHARD/1.1.0',\
  block,\
  capture,\
  logdata:'Blocked client IP: %{tx.wphard.client_ip}, URI: %{REQUEST_URI}',\
  msg:'Wordpress hardening: request from IP reputation blocklist',\
  setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

# Stable-ID no-op: 9522603 handles both the XFF and the no-XFF case via
# the resolved client_ip. This rule is retained only so the existing
# regression test 9522604.yaml has a matching rule ID.
SecAction "id:9522604,phase:2,pass,nolog"

SecMarker "END_WPHARD_IP_REPUTATION"

# ============================================================================
# RESPONSE HEADER VERSION-DISCLOSURE STRIPPING (phase:3)
# ----------------------------------------------------------------------------
# WordPress and several plugins leak version / endpoint hints via response
# headers. We strip the cheap-to-remove ones here. Note: the <meta name=
# "generator"> tag and ?ver= asset query strings live in the response body
# and must be removed at WordPress level (filters: the_generator,
# style_loader_src, script_loader_src) — ModSecurity cannot rewrite bodies
# reliably.
# ============================================================================

#Check if version disclosure stripping should run; skip otherwise
SecRule TX:wphard.block_version_disclosure "@eq 0" \
  "phase:3,\
  id:9522700,\
  pass,\
  nolog,\
  skipAfter:END_WPHARD_VERSION_DISCLOSURE"

SecMarker "BEGIN_WPHARD_VERSION_DISCLOSURE"

# Strip X-Pingback header (advertises /xmlrpc.php to scanners)
SecRule RESPONSE_HEADERS:X-Pingback "@rx ^" \
  "id:9522701,\
  phase:3,\
  t:none,\
  tag:'wordpress',\
  tag:'version-disclosure',\
  tag:'paranoia-level/1',\
  ver:'WPHARD/1.0.0',\
  pass,\
  log,\
  auditlog,\
  ctl:responseHeaderRemove=X-Pingback"

# Strip WordPress version response header if any plugin sets it
SecRule RESPONSE_HEADERS:X-Powered-By "@rx (?i)wordpress|php" \
  "id:9522702,\
  phase:3,\
  t:none,\
  tag:'wordpress',\
  tag:'version-disclosure',\
  tag:'paranoia-level/1',\
  ver:'WPHARD/1.0.0',\
  pass,\
  log,\
  auditlog,\
  ctl:responseHeaderRemove=X-Powered-By"

# Strip REST API discovery Link header (rel=https://api.w.org/)
SecRule RESPONSE_HEADERS:Link "@rx api\.w\.org" \
  "id:9522703,\
  phase:3,\
  t:none,\
  tag:'wordpress',\
  tag:'version-disclosure',\
  tag:'paranoia-level/1',\
  ver:'WPHARD/1.0.0',\
  pass,\
  log,\
  auditlog,\
  ctl:responseHeaderRemove=Link"

SecMarker "END_WPHARD_VERSION_DISCLOSURE"
