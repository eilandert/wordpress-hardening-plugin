---
# WAF security corpus: adversarial evasion + false-positive payloads run on
# BOTH engines via the OFFICIAL OWASP CRS images. An attack that becomes
# bypassable — or a rule that starts over-blocking real WordPress traffic —
# fails this check. Cross-engine by design: a bypass that only works on one
# engine still fails the badge.
#
# Security note: the only run:-context interpolation is github.token; all
# matrix.* values are author-defined in this file. No untrusted event input.
on: [push, pull_request]          # yamllint disable-line rule:truthy
name: WAF security corpus

permissions:
  contents: read

env:
  # renovate: datasource=github-releases depName=coreruleset/go-ftw
  GO_FTW_VERSION: "v2.1.0"
  CRS_TAG: "4.26.0-apache-202605200705"
  CRS_TAG_NGINX: "4.26.0-nginx-202605200705"

jobs:
  security-corpus:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: apache
            engine: "ModSecurity v2"
            port: 8001
          - backend: nginx
            engine: "libmodsecurity3 v3"
            port: 8002
    name: "Corpus — ${{ matrix.engine }}"
    steps:
      - uses: actions/checkout@v4

      - name: Prepare log dir
        env:
          BACKEND: ${{ matrix.backend }}
        run: |
          mkdir -p "tests/logs/$BACKEND"
          : > "tests/logs/$BACKEND/audit.log"
          chmod -R 777 tests/logs

      - name: Stage plugins dir (real plugins + CI extras)
        run: |
          rm -rf tests/integration/.plugins-staged
          mkdir -p tests/integration/.plugins-staged
          cp plugins/* tests/integration/ci-plugin/* \
             tests/integration/.plugins-staged/

      - name: Start backend CRS stack
        env:
          BACKEND: ${{ matrix.backend }}
          PORT: ${{ matrix.port }}
        run: |
          docker compose -f tests/integration/docker-compose.yml up -d "$BACKEND"
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "http://127.0.0.1:${PORT}/"; then
              echo "backend up"; exit 0
            fi
            sleep 1
          done
          echo "backend did not become ready"
          docker compose -f tests/integration/docker-compose.yml logs "$BACKEND"
          exit 1

      - name: Install go-ftw (retry on flaky tar/network)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3; do
            rm -f ftw.tgz ftw
            if gh release download -R coreruleset/go-ftw \
                -p 'ftw_*_linux_amd64.tar.gz' -O ftw.tgz "${GO_FTW_VERSION}" \
                && tar -xzf ftw.tgz ftw; then
              break
            fi
            echo "ftw download attempt ${attempt} failed; retrying"
            sleep 5
          done
          chmod +x ftw
          test -x ftw

      - name: Generate go-ftw config (security corpus)
        env:
          BACKEND: ${{ matrix.backend }}
          PORT: ${{ matrix.port }}
        run: |
          # No ignores: the GeoIP corpus tests now send a public
          # X-Forwarded-For so the RFC-1918 client exemption no longer masks
          # the block on the docker-bridge CI network.
          {
            echo '---'
            echo "logfile: tests/logs/${BACKEND}/audit.log"
            echo 'testoverride:'
            echo '  input:'
            echo '    dest_addr: "127.0.0.1"'
            echo "    port: ${PORT}"
            echo '    override_empty_host_header: true'
          } > tests/integration/.ftw.corpus.yml
          cat tests/integration/.ftw.corpus.yml

      - name: Validate go-ftw test files
        run: ./ftw check -d tests/security --config tests/integration/.ftw.corpus.yml

      - name: Run WAF security corpus (retry on libmodsec3 SDBM flake)
        env:
          BACKEND: ${{ matrix.backend }}
          PORT: ${{ matrix.port }}
        run: |
          # libmodsecurity3 (nginx backend) has a known SDBM persistent-
          # collection race; retry on a fresh container, pass on first clean
          # run. Apache is stable and almost always passes on attempt 1.
          for attempt in 1 2 3 4 5; do
            echo "::group::attempt ${attempt}"
            docker compose -f tests/integration/docker-compose.yml restart "$BACKEND"
            for i in $(seq 1 30); do
              curl -fsS -o /dev/null "http://127.0.0.1:${PORT}/" && break
              sleep 1
            done
            : > "tests/logs/${BACKEND}/audit.log"
            if ./ftw run -d tests/security \
                 --config tests/integration/.ftw.corpus.yml --show-failures-only; then
              echo "::endgroup::"
              echo "clean on attempt ${attempt}"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt ${attempt} had failures; retrying on a fresh container"
          done
          echo "corpus failed all 5 attempts — treating as a real failure"
          exit 1

      - name: Dump logs on failure
        if: failure()
        env:
          BACKEND: ${{ matrix.backend }}
        run: |
          echo "=== container logs ==="
          docker compose -f tests/integration/docker-compose.yml logs "$BACKEND" || true
          echo "=== modsec audit log ==="
          tail -n 200 "tests/logs/${BACKEND}/audit.log" || true

      - name: Tear down
        if: always()
        run: docker compose -f tests/integration/docker-compose.yml down -t 0 || true
