---
# WAF security corpus: adversarial evasion + false-positive payloads run
# against the OFFICIAL OWASP CRS image on Apache + ModSecurity v2. An attack
# that becomes bypassable — or a rule that starts over-blocking real WordPress
# traffic — fails this check.
#
# Apache only: mod_security2 evaluates the corpus deterministically, so this is
# a reliable mandatory gate. libmodsecurity3 v3 has an upstream
# transaction-handling non-determinism that makes a behavioural badge on that
# engine unreliable (see nginx-libmodsecurity3.yml, which gates rule
# parse/load on v3 instead). The corpus rules are byte-identical across
# engines, so a real bypass/over-block is caught here regardless.
#
# Security note: the only run:-context interpolation is github.token.
on: [push, pull_request]          # yamllint disable-line rule:truthy
name: WAF security corpus

permissions:
  contents: read

env:
  # renovate: datasource=github-releases depName=coreruleset/go-ftw
  GO_FTW_VERSION: "v2.1.0"
  CRS_TAG: "4.26.0-apache-202605200705"
  CRS_TAG_NGINX: "4.26.0-nginx-202605200705"

jobs:
  security-corpus:
    name: "Corpus — ModSecurity v2"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare log dir
        run: |
          mkdir -p tests/logs/apache
          : > tests/logs/apache/audit.log
          chmod -R 777 tests/logs

      - name: Stage plugins dir (real plugins + CI extras)
        run: |
          rm -rf tests/integration/.plugins-staged
          mkdir -p tests/integration/.plugins-staged
          cp plugins/* tests/integration/ci-plugin/* \
             tests/integration/.plugins-staged/

      - name: Start Apache CRS stack
        run: |
          docker compose -f tests/integration/docker-compose.yml up -d apache
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "http://127.0.0.1:8001/"; then
              echo "apache up"; exit 0
            fi
            sleep 1
          done
          echo "apache did not become ready"
          docker compose -f tests/integration/docker-compose.yml logs apache
          exit 1

      - name: Install go-ftw (retry on flaky tar/network)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3; do
            rm -f ftw.tgz ftw
            if gh release download -R coreruleset/go-ftw \
                -p 'ftw_*_linux_amd64.tar.gz' -O ftw.tgz "${GO_FTW_VERSION}" \
                && tar -xzf ftw.tgz ftw; then
              break
            fi
            echo "ftw download attempt ${attempt} failed; retrying"
            sleep 5
          done
          chmod +x ftw
          test -x ftw

      - name: Generate go-ftw config (security corpus, apache @ :8001)
        run: |
          # No ignores: the GeoIP corpus tests send a public X-Forwarded-For so
          # the RFC-1918 client exemption no longer masks the block on the
          # docker-bridge CI network.
          {
            echo '---'
            echo 'logfile: tests/logs/apache/audit.log'
            echo 'testoverride:'
            echo '  input:'
            echo '    dest_addr: "127.0.0.1"'
            echo '    port: 8001'
            echo '    override_empty_host_header: true'
          } > tests/integration/.ftw.corpus.yml
          cat tests/integration/.ftw.corpus.yml

      - name: Run WAF security corpus
        run: |
          ./ftw check -d tests/security --config tests/integration/.ftw.corpus.yml
          ./ftw run   -d tests/security --config tests/integration/.ftw.corpus.yml \
            --show-failures-only

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== container logs ==="
          docker compose -f tests/integration/docker-compose.yml logs apache || true
          echo "=== modsec audit log ==="
          tail -n 200 tests/logs/apache/audit.log || true

      - name: Tear down
        if: always()
        run: docker compose -f tests/integration/docker-compose.yml down -t 0 || true
