---
# Apache httpd + ModSecurity v2, via the OFFICIAL OWASP CRS image
# (owasp/modsecurity-crs:<tag>-apache). The image is a reverse proxy in front
# of a tiny stub origin; this repo's plugin tree + a CI-only config plugin are
# mounted into the CRS plugins dir. go-ftw drives the regression suite and
# asserts on the ModSecurity audit log.
#
# Using the upstream image means CRS version drift never breaks the build the
# way a pinned deb package did — the tag is bumped here, in one place.
#
# Security note: the only ${{ }} in a run: context is github.token; no
# untrusted event input is interpolated anywhere.
on: [push, pull_request]          # yamllint disable-line rule:truthy
name: Apache + ModSecurity v2

permissions:
  contents: read

env:
  # renovate: datasource=github-releases depName=coreruleset/go-ftw
  GO_FTW_VERSION: "v2.1.0"
  # Official OWASP CRS image tags. Bump together; -dev tags are not used.
  CRS_TAG: "4.26.0-apache-202605200705"
  CRS_TAG_NGINX: "4.26.0-nginx-202605200705"

jobs:
  apache-modsecurity2:
    name: Apache + ModSecurity v2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare log dir
        run: |
          mkdir -p tests/logs/apache
          : > tests/logs/apache/audit.log
          chmod -R 777 tests/logs

      - name: Stage plugins dir (real plugins + CI extras)
        run: |
          rm -rf tests/integration/.plugins-staged
          mkdir -p tests/integration/.plugins-staged
          cp plugins/* tests/integration/ci-plugin/* \
             tests/integration/.plugins-staged/

      - name: Start Apache CRS stack
        run: |
          docker compose -f tests/integration/docker-compose.yml up -d apache
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "http://127.0.0.1:8001/"; then
              echo "apache up"; exit 0
            fi
            sleep 1
          done
          echo "apache did not become ready"
          docker compose -f tests/integration/docker-compose.yml logs apache
          exit 1

      - name: Install go-ftw (retry on flaky tar/network)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3; do
            rm -f ftw.tgz ftw
            if gh release download -R coreruleset/go-ftw \
                -p 'ftw_*_linux_amd64.tar.gz' -O ftw.tgz "${GO_FTW_VERSION}" \
                && tar -xzf ftw.tgz ftw; then
              break
            fi
            echo "ftw download attempt ${attempt} failed; retrying"
            sleep 5
          done
          chmod +x ftw
          test -x ftw

      - name: Use committed go-ftw config (apache @ :8001)
        run: cat tests/integration/.ftw.yml

      - name: Run plugin regression suite
        run: |
          ./ftw check -d tests/regression --config tests/integration/.ftw.yml
          ./ftw run   -d tests/regression --config tests/integration/.ftw.yml \
            --show-failures-only

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== container logs ==="
          docker compose -f tests/integration/docker-compose.yml logs apache || true
          echo "=== modsec audit log ==="
          tail -n 200 tests/logs/apache/audit.log || true

      - name: Tear down
        if: always()
        run: docker compose -f tests/integration/docker-compose.yml down -t 0 || true
