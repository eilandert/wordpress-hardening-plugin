---
# nginx + libmodsecurity3 v3 — PARSE / LOAD gate (the production engine).
#
# This job proves the plugin's rules PARSE and LOAD on libmodsecurity3 v3 (the
# engine mail.myguard.nl actually runs) and that the engine evaluates them —
# deterministically, so it is a hard mandatory gate.
#
# It does NOT run the full go-ftw behavioural suite on v3: libmodsecurity3 has
# an upstream transaction-handling non-determinism that intermittently drops a
# random rule for one request per run (confirmed: not the plugin — the
# byte-identical rules run green and deterministic on Apache + mod_security2,
# which is the blocking *functional* gate in apache-modsecurity2.yml). Gating a
# mandatory check on a flaky engine would mean retry hacks or spurious red, so
# functionality is gated on Apache and loadability is gated here.
#
# How the gate works:
#   1. The official CRS image loads all rules at nginx startup; a rule that is
#      malformed on v3 makes the container fail to serve -> the readiness wait
#      times out -> this job fails. That is the parse/load gate.
#   2. A tiny deterministic smoke check (no request body, no persistent
#      collection — the parts that flake) confirms rules are actually active:
#      GET /wp-json/ must trip rule 9522207 (REST-API root block), and the
#      homepage must stay clean.
#
# Security note: the only run:-context interpolation is github.token.
on: [push, pull_request]          # yamllint disable-line rule:truthy
name: nginx + libmodsecurity3

permissions:
  contents: read

env:
  CRS_TAG: "4.26.0-apache-202605200705"
  CRS_TAG_NGINX: "4.26.0-nginx-202605200705"

jobs:
  nginx-libmodsecurity3:
    name: nginx + libmodsecurity3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare log dir
        run: |
          mkdir -p tests/logs/nginx
          : > tests/logs/nginx/audit.log
          chmod -R 777 tests/logs

      - name: Stage plugins dir (real plugins + CI extras)
        run: |
          rm -rf tests/integration/.plugins-staged
          mkdir -p tests/integration/.plugins-staged
          cp plugins/* tests/integration/ci-plugin/* \
             tests/integration/.plugins-staged/

      - name: Start nginx CRS stack (rule parse/load gate)
        run: |
          # If any rule is invalid on libmodsecurity3 v3, the engine fails to
          # load it at startup and nginx never serves — the wait below times
          # out and the job fails. That is the parse/load gate.
          docker compose -f tests/integration/docker-compose.yml up -d nginx
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "http://127.0.0.1:8002/"; then
              echo "nginx up — all rules parsed and loaded on libmodsecurity3"
              exit 0
            fi
            sleep 1
          done
          echo "nginx did not become ready — a rule likely failed to load on v3"
          docker compose -f tests/integration/docker-compose.yml logs nginx
          exit 1

      - name: Smoke test — rules are active on v3
        run: |
          UA="Mozilla/5.0 (ci-smoke)"
          # Positive: REST-API root block (deterministic GET, no body/collection).
          : > tests/logs/nginx/audit.log
          curl -s -o /dev/null -A "$UA" "http://127.0.0.1:8002/wp-json/"
          sleep 1
          if ! grep -q 'id "9522207"' tests/logs/nginx/audit.log; then
            echo "FAIL: rule 9522207 did not fire on /wp-json/ — rules not active"
            tail -n 100 tests/logs/nginx/audit.log
            exit 1
          fi
          # Negative: the homepage must not trip any plugin (9522xxx) rule.
          : > tests/logs/nginx/audit.log
          curl -s -o /dev/null -A "$UA" "http://127.0.0.1:8002/"
          sleep 1
          if grep -qE 'id "9522[0-9]+"' tests/logs/nginx/audit.log; then
            echo "FAIL: a plugin rule tripped on the clean homepage"
            tail -n 100 tests/logs/nginx/audit.log
            exit 1
          fi
          echo "smoke OK: 9522207 fired on /wp-json/, homepage clean"

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== container logs ==="
          docker compose -f tests/integration/docker-compose.yml logs nginx || true
          echo "=== modsec audit log ==="
          tail -n 200 tests/logs/nginx/audit.log || true

      - name: Tear down
        if: always()
        run: docker compose -f tests/integration/docker-compose.yml down -t 0 || true
