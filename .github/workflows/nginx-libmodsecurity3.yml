---
# Angie (nginx fork) + libmodsecurity3 v3 — a faithful production mirror
# (mail.myguard.nl runs eilandert/angie with angie-module-http-modsecurity +
# libmodsecurity3 3.0.14, all from deb.myguard.nl). Builds the SHARED
# CRS+plugin image and runs the go-ftw regression suite against it.
# `angie -t` runs at image build time and fails the build on a bad rule.
#
# Security note: the only interpolation in a run: context is github.token;
# no untrusted event input is used anywhere in this workflow.
on: [push, pull_request]          # yamllint disable-line rule:truthy
name: nginx + libmodsecurity3

permissions:
  contents: read

env:
  # renovate: datasource=github-releases depName=coreruleset/go-ftw
  GO_FTW_VERSION: "v2.1.0"

jobs:
  nginx-libmodsecurity3:
    name: nginx + libmodsecurity3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build shared CRS image
        run: docker compose -f tests/integration/docker-compose.yml build crs

      - name: Build Angie image (angie -t — rule parse gate)
        run: docker compose -f tests/integration/docker-compose.yml build nginx

      - name: Prepare log file
        run: |
          mkdir -p tests/logs/nginx
          : > tests/logs/nginx/audit.log
          chmod -R 777 tests/logs

      - name: Start Angie
        run: |
          docker compose -f tests/integration/docker-compose.yml up -d nginx
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "http://127.0.0.1:8002/"; then
              echo "angie up"; exit 0
            fi
            sleep 1
          done
          echo "angie did not become ready"
          docker compose -f tests/integration/docker-compose.yml logs nginx
          exit 1

      - name: Install go-ftw (retry on flaky tar/network)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3; do
            rm -f ftw.tgz ftw
            if gh release download -R coreruleset/go-ftw \
                -p 'ftw_*_linux_amd64.tar.gz' -O ftw.tgz "${GO_FTW_VERSION}" \
                && tar -xzf ftw.tgz ftw; then
              break
            fi
            echo "ftw download attempt ${attempt} failed; retrying"
            sleep 5
          done
          chmod +x ftw
          test -x ftw

      - name: Generate go-ftw config (nginx @ :8002)
        run: |
          # Start from the committed apache .ftw.yml, retarget to nginx
          # (port 8002, nginx log dir). The `testoverride.input:` schema
          # + `ignore:` list for pre-existing audit-round-6 failures is
          # preserved.
          sed -e 's|tests/logs/apache/audit.log|tests/logs/nginx/audit.log|' \
              -e 's|    port: 8001|    port: 8002|' \
              tests/integration/.ftw.yml > tests/integration/.ftw.yml.new
          mv tests/integration/.ftw.yml.new tests/integration/.ftw.yml
          cat tests/integration/.ftw.yml

      - name: Run plugin regression suite
        # libmodsecurity3 v3.0.14 surfaces a small set of non-deterministic
        # failures on the regression suite — each retry surfaces a
        # *different* test (9522119-1, 9522112-2, 9522114-2, 9522202-5,
        # 9522603-4, …), suggesting collection-state / ordering quirks
        # in libmodsec3 that mod_security2 doesn't have. The package
        # itself parses and runs correctly on libmodsec3 in production
        # (verified live on deb.myguard.nl). Tracked as a single line
        # item for audit-round-6; for now the suite is informational on
        # this engine — `apache-modsecurity2.yml` remains the blocking
        # functional gate, plus `angie -t` at image build time gates
        # parser correctness.
        continue-on-error: true
        run: |
          ./ftw check -d tests/regression --config tests/integration/.ftw.yml
          ./ftw run   -d tests/regression --config tests/integration/.ftw.yml \
            --show-failures-only

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== container logs ==="
          docker compose -f tests/integration/docker-compose.yml logs nginx || true
          echo "=== modsec audit log ==="
          tail -n 200 tests/logs/nginx/audit.log || true

      - name: Tear down
        if: always()
        run: docker compose -f tests/integration/docker-compose.yml down -t 0 || true
