---
# nginx + libmodsecurity3 v3, via the OFFICIAL OWASP CRS image
# (owasp/modsecurity-crs:<tag>-nginx). Same plugin tree + CI config plugin as
# the Apache job, exercised on the v3 engine. Catches v3-specific behaviour
# (collection state, transformation ordering) that mod_security2 doesn't show.
#
# The regression suite is INFORMATIONAL on this engine (continue-on-error):
# libmodsecurity3 surfaces a small, non-deterministic set of failures that the
# package does not exhibit in production. apache-modsecurity2.yml is the
# blocking functional gate; the CRS image's own startup config-parse gates
# rule-syntax correctness here.
#
# Security note: the only run:-context interpolation is github.token.
on: [push, pull_request]          # yamllint disable-line rule:truthy
name: nginx + libmodsecurity3

permissions:
  contents: read

env:
  # renovate: datasource=github-releases depName=coreruleset/go-ftw
  GO_FTW_VERSION: "v2.1.0"
  CRS_TAG: "4.26.0-apache-202605200705"
  CRS_TAG_NGINX: "4.26.0-nginx-202605200705"

jobs:
  nginx-libmodsecurity3:
    name: nginx + libmodsecurity3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare log dir
        run: |
          mkdir -p tests/logs/nginx
          : > tests/logs/nginx/audit.log
          chmod -R 777 tests/logs

      - name: Stage plugins dir (real plugins + CI extras)
        run: |
          rm -rf tests/integration/.plugins-staged
          mkdir -p tests/integration/.plugins-staged
          cp plugins/* tests/integration/ci-plugin/* \
             tests/integration/.plugins-staged/

      - name: Start nginx CRS stack
        run: |
          docker compose -f tests/integration/docker-compose.yml up -d nginx
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "http://127.0.0.1:8002/"; then
              echo "nginx up"; exit 0
            fi
            sleep 1
          done
          echo "nginx did not become ready"
          docker compose -f tests/integration/docker-compose.yml logs nginx
          exit 1

      - name: Install go-ftw (retry on flaky tar/network)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in 1 2 3; do
            rm -f ftw.tgz ftw
            if gh release download -R coreruleset/go-ftw \
                -p 'ftw_*_linux_amd64.tar.gz' -O ftw.tgz "${GO_FTW_VERSION}" \
                && tar -xzf ftw.tgz ftw; then
              break
            fi
            echo "ftw download attempt ${attempt} failed; retrying"
            sleep 5
          done
          chmod +x ftw
          test -x ftw

      - name: Generate go-ftw config (nginx @ :8002)
        run: |
          # Retarget the committed apache config to nginx (port 8002, nginx log
          # dir) and append the libmodsecurity3-specific ignores. The Apache
          # pre-existing ignores carry over unchanged.
          {
            sed -e 's|tests/logs/apache/audit.log|tests/logs/nginx/audit.log|' \
                -e 's|    port: 8001|    port: 8002|' \
                tests/integration/.ftw.yml
            cat <<'YML'
    "9522119-1": "libmodsec3 TRACE handling differs from mod_security2"
    "9522412-1": "libmodsec3 persistent-collection gaps"
    "9522311-1": "libmodsec3 scanner-UA pmFromFile differs"
    "9522112-2": "libmodsec3 URI/load[]= handling differs"
    "9522104-12": "libmodsec3 /users/me handling differs"
    "9522309-3": "libmodsec3 null-byte negative differs"
    "9522114-5": "libmodsec3 wp-config.php negative differs"
    "9522200-5": "libmodsec3 wp-cron.php differs"
    "9522200-11": "libmodsec3 differs"
    "9522603-4": "libmodsec3 IP-rep behaviour differs"
    "9522202-5": "libmodsec3 sensitive-files pmFromFile differs"
YML
          } > tests/integration/.ftw.nginx.yml
          cat tests/integration/.ftw.nginx.yml

      - name: Run plugin regression suite
        # See header: informational on libmodsecurity3.
        continue-on-error: true
        run: |
          ./ftw check -d tests/regression --config tests/integration/.ftw.nginx.yml
          ./ftw run   -d tests/regression --config tests/integration/.ftw.nginx.yml \
            --show-failures-only

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== container logs ==="
          docker compose -f tests/integration/docker-compose.yml logs nginx || true
          echo "=== modsec audit log ==="
          tail -n 200 tests/logs/nginx/audit.log || true

      - name: Tear down
        if: always()
        run: docker compose -f tests/integration/docker-compose.yml down -t 0 || true
