---
meta:
  author: Thijs Eilander
  description: "False-positive corpus: legitimate WordPress traffic that must
    NOT trip any wordpress-hardening rule. Each test asserts no_log_contains
    'id \"9522' — i.e. no plugin rule (9522xxx) fired. A failure here means
    the plugin over-blocks real users."
  enabled: true
  name: false-positives.yaml
# Corpus spans many rule IDs; assertions live in each test's
# output.no_log_contains. This top-level rule_id is FTW reporting metadata
# only (the plugin's allocated base id).
rule_id: 9522000
tests:
  - test_title: fp-homepage
    desc: Plain homepage GET must not trip the plugin.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: /
        output:
          no_log_contains: id "9522

  - test_title: fp-normal-post
    desc: Reading a normal permalink must not trip the plugin.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: /2026/05/some-blog-post/
        output:
          no_log_contains: id "9522

  - test_title: fp-admin-ajax
    desc: >
      Standard wp-admin/admin-ajax.php POST (heartbeat etc.) is legit.
      Regression for the chain-setvar bug in 9522200: the parent's setvar
      previously fired unconditionally on any ".php$" match, scoring +5 even
      when the chained allow-list check passed. Assert no anomaly score is
      contributed (per_pl=0-0-0-0) in addition to no 9522 rule log line.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: Mozilla/5.0
            Content-Type: application/x-www-form-urlencoded
          port: 80
          method: POST
          uri: /wp-admin/admin-ajax.php
          data: "action=heartbeat&_nonce=abc123&data=1"
        output:
          no_log_contains: id "9522
          no_log_contains: "per_pl=[1-9]"

  - test_title: fp-wpcron-internal
    desc: >
      wp-cron.php from the loopback (internal WP self-call) is legit.
      Regression for the chain-setvar bug in 9522200: assert no anomaly
      score is contributed in addition to no 9522 rule log line.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "WordPress/6.9; https://localhost"
            X-Forwarded-For: 127.0.0.1
          port: 80
          method: POST
          uri: /wp-cron.php?doing_wp_cron=1779142579.0
        output:
          no_log_contains: id "9522
          no_log_contains: "per_pl=[1-9]"

  - test_title: fp-wp-login-plain
    desc: >
      Plain GET of /wp-login.php is legit. Regression for the chain-setvar
      bug in 9522315: the parent's setvar previously fired on any URI
      beginning with "/wp-login.php", scoring +5 even when no injection was
      present in ARGS:log/pwd. Assert no anomaly score and no rule log line.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: /wp-login.php
        output:
          no_log_contains: id "9522
          no_log_contains: "per_pl=[1-9]"

  - test_title: fp-wp-login-normal-post
    desc: >
      Normal wp-login.php POST (no injection) is legit. Regression for
      9522315 chain-setvar bug — assert no anomaly score contribution.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: Mozilla/5.0
            Content-Type: application/x-www-form-urlencoded
          port: 80
          method: POST
          uri: /wp-login.php
          data: "log=normaluser&pwd=correcthorsebatterystaple&wp-submit=Log+In"
        output:
          no_log_contains: id "9522
          no_log_contains: "per_pl=[1-9]"

  - test_title: fp-wpjson-subpath-read
    desc: >
      Only the /wp-json ROOT is blocked (9522207); a real REST read of a
      sub-resource must pass when block_rest_api is default-off.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: /wp-json/wp/v2/posts?per_page=5
        output:
          no_log_contains: id "9522

  - test_title: fp-upload-image
    desc: Serving a normal uploaded image must not hit the upload-traversal
      / interpreter rules.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: /wp-content/uploads/2026/05/holiday-photo.webp
        output:
          no_log_contains: id "9522

  - test_title: fp-theme-asset
    desc: Loading a theme stylesheet must not trip the php/file rules.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: /wp-content/themes/twentytwentyfive/style.css?ver=1.2
        output:
          no_log_contains: id "9522

  - test_title: fp-legit-login-whitelisted-ip
    desc: >
      A real (non-"admin") login from a whitelisted RFC1918 client must NOT
      be GeoIP-blocked or login-injection-blocked even with the GeoIP feature
      enabled (rule 9522506 IP whitelist applies).
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: Mozilla/5.0
            Content-Type: application/x-www-form-urlencoded
            X-Forwarded-For: 192.168.1.50
            CF-IPCountry: NL
          port: 80
          method: POST
          uri: /wp-login.php
          data: "log=alice&pwd=correcthorsebatterystaple&wp-submit=Log+In"
        output:
          no_log_contains: id "9522

  - test_title: fp-tutorial-permalink-php-keywords
    desc: >
      Production FP audited 2026-05-22 on deb.myguard.nl: CRS rules
      953100/953110/953120 (RESPONSE-953-DATA-LEAKAGES-PHP) fired on
      tutorial-post HTML containing PHP function names and `<?php` snippets,
      accumulating outbound anomaly score until 959100 returned 302/403 and
      hid the article from readers. Rule 9522801 removes those three CRS
      rules on front-end permalinks (any path that is NOT admin/login/REST/
      cron/xmlrpc/wp-content/wp-includes). This test asserts that a permalink
      GET produces no plugin rule fire and that 953100/953110/953120 are not
      logged either.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: /2026/05/nginx-angie-the-expert-guide-to-maximum-performance-and-security/
        output:
          no_log_contains: id "9522
          no_log_contains: id "953100"
          no_log_contains: id "953110"
          no_log_contains: id "953120"

  - test_title: fp-orderby-legit
    desc: >
      Legitimate sortable archive (orderby=column, order=asc|desc) must not
      trip the typed-param SQLi rules 9522330/9522331/9522332.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: "/shop/?orderby=post_date&order=desc"
        output:
          no_log_contains: id "9522

  - test_title: fp-orderby-multicolumn
    desc: >
      Space/comma-separated multi-column orderby (WP accepts "title menu_order")
      must pass the PL1 metachar check (9522331) and the PL2 allowlist (9522332).
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: "/?orderby=title%20menu_order&order=ASC"
        output:
          no_log_contains: id "9522

  - test_title: fp-order-array-reorder
    desc: >
      admin-ajax reorder vector uses order[]= (an array, distinct ARGS key),
      which 9522330 must not match.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: Mozilla/5.0
            Content-Type: application/x-www-form-urlencoded
          port: 80
          method: POST
          uri: /wp-admin/admin-ajax.php
          data: "action=save_order&order%5B%5D=12&order%5B%5D=7&order%5B%5D=33"
        output:
          no_log_contains: id "9522

  - test_title: fp-numeric-queryvars
    desc: >
      Integer WP-core query-vars (p/page_id/paged) must not trip 9522333.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: "/?p=123&page_id=45&paged=2&m=202605"
        output:
          no_log_contains: id "9522

  - test_title: fp-cat-list-negative
    desc: >
      cat= accepts comma-separated and negative ID lists; it is intentionally
      excluded from the integer rules and must not trip them.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: "/?cat=1,2,-3"
        output:
          no_log_contains: id "9522

  - test_title: fp-strict-integer-params-legit
    desc: >
      With strict_integer_params enabled (CI), integer id/post_id/user_id must
      still pass 9522334.
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers: {Host: localhost, User-Agent: Mozilla/5.0}
          port: 80
          method: GET
          uri: "/?user_id=5&post_id=10&id=42"
        output:
          no_log_contains: id "9522
