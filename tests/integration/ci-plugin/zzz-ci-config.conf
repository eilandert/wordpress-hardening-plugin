# ---------------------------------------------------------------------------
# CI-ONLY plugin config. Mounted into the official CRS image plugins dir
# (/etc/modsecurity.d/owasp-crs/plugins/) ALONGSIDE the real plugin files, so
# it loads in the *-config.conf phase BEFORE the plugin's own -before rules.
#
# It does two things the production deployment does NOT:
#   1. Enables the opt-in features (GeoIP login control, IP reputation,
#      scanner blocking, REST-API block, wp-cron block, strict integer params)
#      that ship DISABLED by default, so their rules are actually exercised.
#   2. Bumps detection paranoia to 2 so the PL2 plugin rules run.
#
# The go-ftw X-CRS-Test marker rule (id 999999) lives in zzz-ci-marker.conf
# (a *-before.conf file) so it evaluates in phase 1 of every request.
#
# NEVER ship this file to production — it is test-harness wiring only.
# ---------------------------------------------------------------------------

SecAction "id:9519990,phase:1,nolog,pass,t:none,setvar:tx.wphard.geoip_login_enabled=1"
SecAction "id:9519991,phase:1,nolog,pass,t:none,setvar:tx.wphard.ip_reputation_enabled=1"
SecAction "id:9519992,phase:1,nolog,pass,t:none,setvar:tx.detection_paranoia_level=2"
SecAction "id:9519993,phase:1,nolog,pass,t:none,setvar:tx.wphard.block_scanners=1"
SecAction "id:9519994,phase:1,nolog,pass,t:none,setvar:tx.wphard.block_rest_api=1"
SecAction "id:9519995,phase:1,nolog,pass,t:none,setvar:tx.wphard.block_wpcron=1"
SecAction "id:9519996,phase:1,nolog,pass,t:none,setvar:tx.wphard.strict_integer_params=1"
