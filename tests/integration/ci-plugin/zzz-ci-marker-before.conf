# ---------------------------------------------------------------------------
# CI-ONLY go-ftw log marker. *-before.conf so it runs phase 1 on every
# request. The go-ftw harness brackets each test with requests carrying an
# X-CRS-Test header holding a UUID; echoing that UUID into the audit log lets
# go-ftw locate each test's start/end boundary. Id is outside the plugin's
# 9522xxx block and all CRS ranges. CI-only — never ship to production.
# ---------------------------------------------------------------------------
SecRule REQUEST_HEADERS:X-CRS-Test "@rx ^.*$" \
    "id:999999,phase:1,pass,t:none,log,auditlog,msg:'X-CRS-Test=%{MATCHED_VAR}'"
