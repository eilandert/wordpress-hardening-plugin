# Single include chain loaded identically by Apache (mod_security2) and
# Angie (libmodsecurity3). Anything that fails to parse here fails BOTH
# engine builds.

Include /opt/crs/modsecurity.conf
Include /opt/crs/crs-setup.conf

# go-ftw log marker. The harness brackets every test with requests carrying
# an X-CRS-Test header holding a UUID; this rule echoes that UUID into the
# audit log so go-ftw can locate each test's start/end boundary. CI-only,
# id outside the plugin's 9522xxx block and CRS ranges.
SecRule REQUEST_HEADERS:X-CRS-Test "@rx ^.*$" \
    "id:999999,phase:1,pass,t:none,log,auditlog,msg:'X-CRS-Test=%{MATCHED_VAR}'"

# Plugin phase-1 config (defaults / feature gates).
# Plain `Include` only: libmodsecurity3 3.0.14 does NOT understand
# IncludeOptional. Apache's Include is fatal on a zero-match glob, so the CI
# CRS image ships a no-op *-after.conf (see crs/Dockerfile) to keep every
# glob non-empty on both engines.
Include /opt/crs/plugins/*-config.conf

# CI: enable the GeoIP login control + IP-reputation features (both ship
# disabled by default) so rules 9522500/9522501/9522510 and 9522600+ are
# actually exercised. Mirrors the crs-config block of the old integration.yml.
SecAction "id:9519990,phase:1,nolog,pass,t:none,setvar:tx.wphard.geoip_login_enabled=1"
SecAction "id:9519991,phase:1,nolog,pass,t:none,setvar:tx.wphard.ip_reputation_enabled=1"

# CI: bump detection paranoia level to 2 so the PL2 plugin rules are
# exercised (9522203 other-interpreters, 9522309 null-byte, 9522311
# scanner-UAs, 9522317 dangerous-admin). On a production deployment the
# operator decides; this only affects the integration test image.
SecAction "id:9519992,phase:1,nolog,pass,t:none,setvar:tx.detection_paranoia_level=2"
# CI: also enable block_scanners so 9522311 fires for known scanner UAs.
SecAction "id:9519993,phase:1,nolog,pass,t:none,setvar:tx.wphard.block_scanners=1"

# Plugin "before" rules -> CRS core rules -> plugin "after" rules.
Include /opt/crs/plugins/*-before.conf
Include /opt/crs/rules/*.conf
Include /opt/crs/plugins/*-after.conf
