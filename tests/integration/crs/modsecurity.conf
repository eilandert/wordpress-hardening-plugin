# Minimal ModSecurity engine config shared by both backends.
# DetectionOnly: rules evaluate and log but do not block, so go-ftw can drive
# every endpoint and assert on the audit log without traffic being 403'd.
SecRuleEngine DetectionOnly

SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction ProcessPartial
SecResponseBodyAccess Off

SecTmpDir /tmp/
SecDataDir /tmp/

# Serial audit log, native format. go-ftw greps this for `id "NNNN"`.
# (FTW_LOGFILE in the workflow points the harness at /var/log/modsec/audit.log,
#  which each backend bind-mounts to this path.)
# SecAuditEngine On (log every transaction): go-ftw brackets each test with
# benign start/end marker requests and must find them in the log; RelevantOnly
# would drop those 200s and break marker detection.
SecAuditEngine On
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsec/audit.log

SecPcreMatchLimit 100000
SecPcreMatchLimitRecursion 100000

SecArgumentSeparator &
SecCookieFormat 0
SecStatusEngine Off
