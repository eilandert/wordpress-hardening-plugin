# Stub origin behind the CRS reverse-proxy. Returns 200 "ok" on EVERY path
# and method so go-ftw can drive any endpoint (/status/200, /wp-login.php,
# /?orderby=..., /xmlrpc.php, …) and assert purely on the ModSecurity audit
# log. The WAF runs in DetectionOnly, so nothing is blocked; this origin just
# has to answer 200 for the request to complete and be logged.
events {}
http {
    access_log off;
    server {
        listen 80 default_server;
        server_name _;
        location / {
            default_type text/plain;
            return 200 'ok';
        }
    }
}
