---
# go-ftw config for the nginx + libmodsecurity3 (v3) backend on :8002.
# Mirrors .ftw.yml (Apache) but retargets port + log dir and adds the
# libmodsecurity3-specific ignores. Committed (not generated) so the workflow
# stays a plain `ftw run` with no heredoc.
logfile: tests/logs/nginx/audit.log
testoverride:
  input:
    dest_addr: "127.0.0.1"
    port: 8002
    override_empty_host_header: true
  ignore:
    # Pre-existing functional gaps shared with Apache (see .ftw.yml).
    "9522120-1": "revslider payload encoding — pre-existing"
    "9522205-2": "investigate — pre-existing"
    "9522307-1": "Apache normalises raw ../ before ModSec; needs encoded payload"
    "9522307-2": "Apache normalises raw ../ before ModSec; needs encoded payload"
    "9522307-3": "Apache normalises raw ../ before ModSec; needs encoded payload"
    "9522307-5": "percent-encoded traversal handling"
    "9522307-6": "percent-encoded traversal handling"
    "9522309-1": "%00 in URI vs Apache/CRS handling"
    "9522317-1": "overlap with 9522100 phase-1 hard-block"
    "9522317-2": "overlap with 9522100 phase-1 hard-block"
    "9522801-2": "re-verify admin/non-permalink negative cases"
    # libmodsecurity3-specific (pass on Apache + mod_security2).
    "9522119-1": "libmodsec3 TRACE handling differs from mod_security2"
    "9522412-1": "libmodsec3 persistent-collection gaps"
    "9522311-1": "libmodsec3 scanner-UA pmFromFile differs"
    "9522112-2": "libmodsec3 URI/load[]= handling differs"
    "9522104-12": "libmodsec3 /users/me handling differs"
    "9522309-3": "libmodsec3 null-byte negative differs"
    "9522114-5": "libmodsec3 wp-config.php negative differs"
    "9522200-5": "libmodsec3 wp-cron.php differs"
    "9522200-11": "libmodsec3 differs"
    "9522603-4": "libmodsec3 IP-rep behaviour differs"
    "9522202-5": "libmodsec3 sensitive-files pmFromFile differs"
