# Integration test stack — official OWASP CRS images.
#
#   backend – tiny nginx origin, returns 200 on every path (go-ftw target).
#   apache  – owasp/modsecurity-crs:<tag>-apache  (ModSecurity v2),  port 8001
#   nginx   – owasp/modsecurity-crs:<tag>-nginx   (libmodsecurity3),  port 8002
#
# Both WAF images are reverse proxies in front of `backend`. They load a
# STAGED plugins dir (.plugins-staged/) that holds the real plugin tree
# (plugins/) PLUS the CI-only extras (ci-plugin/), so the include chain is:
#   *-config.conf -> *-before.conf -> CRS rules -> *-after.conf
# — same order production uses, with PL2 + opt-in features turned on by the CI
# config (see ci-plugin/zzz-ci-config.conf).
#
# The staged dir avoids overlaying individual file mounts into a bind-mounted
# source dir (docker would create stray empty mountpoint files in plugins/).
# Build it before `up` (the workflows do this; locally run the same):
#   rm -rf tests/integration/.plugins-staged
#   mkdir -p tests/integration/.plugins-staged
#   cp plugins/* tests/integration/ci-plugin/* tests/integration/.plugins-staged/
#   docker compose -f tests/integration/docker-compose.yml up -d
#
# Audit logs land on the host under tests/logs/<backend>/audit.log for go-ftw.
#
# CRS_TAG / CRS_TAG_NGINX select the official image tags (defaults track the
# latest stable -apache / -nginx floating tags). Pin dated tags in CI.

x-modsec-env: &modsec-env
  BACKEND: "http://backend:80"
  PORT: "8080"
  PARANOIA: "2"
  MODSEC_RULE_ENGINE: "DetectionOnly"
  MODSEC_AUDIT_ENGINE: "On"
  MODSEC_AUDIT_LOG_FORMAT: "Native"
  MODSEC_AUDIT_LOG_TYPE: "Serial"
  MODSEC_AUDIT_LOG: "/var/log/modsec/audit.log"
  MODSEC_AUDIT_LOG_PARTS: "ABIJDEFHZ"
  MODSEC_REQ_BODY_ACCESS: "On"
  MODSEC_RESP_BODY_ACCESS: "Off"
  # Lower thresholds so scoring rules surface in DetectionOnly logs. Harmless
  # in DetectionOnly mode.
  ANOMALY_INBOUND: "5"
  ANOMALY_OUTBOUND: "4"

services:
  backend:
    image: nginx:alpine
    volumes:
      - ./backend/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: "no"

  apache:
    image: owasp/modsecurity-crs:${CRS_TAG:-apache}
    depends_on: [backend]
    environment:
      <<: *modsec-env
    volumes:
      - ./.plugins-staged:/etc/modsecurity.d/owasp-crs/plugins:ro
      - ../logs/apache:/var/log/modsec
    ports:
      - "8001:8080"

  nginx:
    image: owasp/modsecurity-crs:${CRS_TAG_NGINX:-nginx}
    depends_on: [backend]
    environment:
      <<: *modsec-env
    volumes:
      - ./.plugins-staged:/etc/modsecurity.d/owasp-crs/plugins:ro
      - ../logs/nginx:/var/log/modsec
    # Persistent-collection (initcol:ip / SDBM) store on tmpfs. libmodsecurity3
    # has a known SDBM read-modify-write race that intermittently breaks an
    # unrelated later test; a RAM-backed store cuts the timing window. The
    # nginx workflow additionally retries the suite on a fresh container, which
    # together make this engine a deterministic mandatory gate despite the
    # upstream engine non-determinism.
    tmpfs:
      - /tmp/modsecurity/data
      - /tmp/modsecurity/tmp
    ports:
      - "8002:8080"
