---
meta:
  author: Thijs Eilander
  description: wordpress-hardening-plugin
  enabled: true
  name: 9522603.yaml
tests:
  - test_title: 9522603-1
    desc: >
      Request with X-Forwarded-For set to a blocklisted IP (192.0.2.1, RFC 5737
      TEST-NET-1 — listed in wordpress-hardening-ip-reputation.data for CI tests)
      must be detected. Rule 9522603 must fire.
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: OWASP CRS
              X-Forwarded-For: 192.0.2.1
            port: 80
            method: GET
            uri: /wp-admin/
          output:
            log_contains: id "9522603"

  - test_title: 9522603-2
    desc: >
      Request with X-Forwarded-For set to a non-blocklisted IP must NOT be detected.
      1.2.3.4 is not in the data file. Rule 9522603 must NOT fire.
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: OWASP CRS
              X-Forwarded-For: 1.2.3.4
            port: 80
            method: GET
            uri: /wp-admin/
          output:
            no_log_contains: id "9522603"

  - test_title: 9522603-3
    desc: >
      Request with X-Forwarded-For set to an RFC 1918 address (192.168.1.1) must
      NOT be blocked — private addresses are whitelisted by rule 9522601.
      Rule 9522603 must NOT fire even if the data file contains the public prefix.
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: OWASP CRS
              X-Forwarded-For: 192.168.1.1
            port: 80
            method: GET
            uri: /wp-admin/
          output:
            no_log_contains: id "9522603"

  - test_title: 9522603-4
    desc: >
      IP reputation check applies globally — any URI, not just /wp-login.php.
      A request to the homepage from a blocklisted IP must also be detected.
      Rule 9522603 must fire.
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: OWASP CRS
              X-Forwarded-For: 192.0.2.99
            port: 80
            method: GET
            uri: /
          output:
            log_contains: id "9522603"

  - test_title: 9522603-5
    desc: >
      S3 regression (multi-value XFF smuggling): the client IP resolver takes
      ONLY the first hop. A blocklisted first hop followed by a spoofed private
      IP ("192.0.2.50, 10.0.0.1") must STILL be blocked — the attacker cannot
      append a private token to dodge the reputation check.
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: OWASP CRS
              X-Forwarded-For: "192.0.2.50, 10.0.0.1"
            port: 80
            method: GET
            uri: /
          output:
            log_contains: id "9522603"

  - test_title: 9522603-6
    desc: >
      S3 regression (inverse): a NON-blocklisted first hop followed by a
      blocklisted later token ("8.8.8.8, 192.0.2.50") must NOT be blocked —
      only the genuine first hop is trusted, so a later forged token cannot be
      used to frame another IP either. Rule 9522603 must NOT fire.
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: OWASP CRS
              X-Forwarded-For: "8.8.8.8, 192.0.2.50"
            port: 80
            method: GET
            uri: /
          output:
            no_log_contains: id "9522603"

  - test_title: 9522603-7
    desc: >
      S2 regression (malformed XFF): a junk X-Forwarded-For that yields no
      valid leading IPv4 must fall back to REMOTE_ADDR (loopback in the
      harness, not blocklisted), so the request is NOT blocked and no spoofed
      value is honoured. Rule 9522603 must NOT fire.
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: OWASP CRS
              X-Forwarded-For: "not-an-ip; DROP TABLE"
            port: 80
            method: GET
            uri: /
          output:
            no_log_contains: id "9522603"
