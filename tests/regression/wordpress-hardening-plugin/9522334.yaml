---
meta:
  author: Thijs Eilander
  description: wordpress-hardening-plugin
  enabled: true
  name: 9522334.yaml
tests:
  - test_title: 9522334-1
    desc: >
      Strict generic integer param — non-integer user_id must be blocked.
      Opt-in (default OFF) + PL2: requires tx.wphard.strict_integer_params=1 and
      tx.detection_paranoia_level >= 2 (both set in the CI crs-main.conf).
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: OWASP CRS
          port: 80
          method: GET
          uri: "/?user_id=1%20OR%20sleep(5)"
        output:
          log_contains: id "9522334"
