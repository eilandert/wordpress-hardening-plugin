---
meta:
  author: Thijs Eilander
  description: wordpress-hardening-plugin
  enabled: true
  name: 9522207.yaml
tests:
  - test_title: 9522207-1
    desc: Test if ^/wp-json$ blocks
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            X-Forwarded-For: '8.8.8.8'
            Host: localhost
            User-Agent: OWASP CRS
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          port: 80
          method: GET
          uri: /wp-json
          data: |
            text
        output:
          log_contains: id "9522207"
  - test_title: 9522207-2
    desc: Test if ^/wp-json/$ blocks
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            X-Forwarded-For: '8.8.8.8'
            Host: localhost
            User-Agent: OWASP CRS
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          port: 80
          method: GET
          uri: /wp-json/
          data: |
            text
        output:
          log_contains: id "9522207"
  - test_title: 9522207-3
    desc: Test that rule 9522207 respects gate (block_rest_api must be ON)
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            X-Forwarded-For: '8.8.8.8'
            Host: localhost
            User-Agent: OWASP CRS
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          port: 80
          method: GET
          uri: /wp-json
          data: |
            text
          rule:
            engine: "!@contains TX:wphard.block_rest_api 1"
        output:
          log_not_contains: id "9522207"
