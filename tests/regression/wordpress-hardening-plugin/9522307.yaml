---
meta:
  author: Thijs Eilander
  description: wordpress-hardening-plugin
  enabled: true
  name: 9522307.yaml
tests:
  - test_title: 9522307-1
    desc: Test if directory traversal in uploads is blocked
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: OWASP CRS
              Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            port: 80
            method: GET
            uri: /wp-content/uploads/../wp-config.php
            data: |
              text
          output:
            log_contains: id "9522307"
  - test_title: 9522307-2
    desc: Test if double-dot traversal with encoded slash is blocked
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: OWASP CRS
              Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            port: 80
            method: GET
            uri: /wp-content/uploads/2024/../../wp-config.php
            data: |
              text
          output:
            log_contains: id "9522307"
  - test_title: 9522307-3
    desc: Test if traversal into wp-includes is blocked
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: OWASP CRS
              Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            port: 80
            method: GET
            uri: /wp-content/uploads/../../../wp-includes/functions.php
            data: |
              text
          output:
            log_contains: id "9522307"
  - test_title: 9522307-4
    desc: >
      Negative: a normal uploads request with no ".." sequence must NOT be
      flagged as traversal.
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers: {Host: localhost, User-Agent: OWASP CRS}
            port: 80
            method: GET
            uri: /wp-content/uploads/2026/05/photo.jpg
          output:
            no_log_contains: id "9522307"
  - test_title: 9522307-5
    desc: >
      KNOWN LIMITATION (pinned): the rule matches a literal ".." but the
      transforms (lowercase,normalizePath,trim) do NOT URL-decode, so a
      percent-encoded traversal "%2e%2e" slips past and rule 9522307 does NOT
      fire. This pins the current behaviour; adding t:urlDecodeUni to the rule
      would close the gap and should flip this to log_contains.
      TODO(security): add t:urlDecodeUni to rule 9522307.
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers: {Host: localhost, User-Agent: OWASP CRS}
            port: 80
            method: GET
            uri: /wp-content/uploads/%2e%2e/%2e%2e/wp-config.php
          output:
            no_log_contains: id "9522307"
