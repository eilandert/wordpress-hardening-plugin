---
meta:
  author: Thijs Eilander
  description: wordpress-hardening-plugin rate-limit threshold block
  enabled: true
  name: 9522412.yaml
tests:
  - test_title: 9522412-1
    desc: >
      Brute-force lockout: repeated POSTs to /wp-login.php from the same
      non-whitelisted IP increment ip.login_attempts (rule 9522411). Once the
      counter reaches the default threshold (5), rule 9522412 must fire.
      Stages share collection state, so the early stages build the counter and
      the final stage trips the block. Only the LAST stage asserts the block.
    stages:
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: Mozilla/5.0
              Content-Type: application/x-www-form-urlencoded
              X-Forwarded-For: 203.0.113.77
            port: 80
            method: POST
            uri: /wp-login.php
            data: log=admin&pwd=wrong1
          output:
            no_log_contains: id "9522412"
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: Mozilla/5.0
              Content-Type: application/x-www-form-urlencoded
              X-Forwarded-For: 203.0.113.77
            port: 80
            method: POST
            uri: /wp-login.php
            data: log=admin&pwd=wrong2
          output:
            no_log_contains: id "9522412"
      - stage:
          input:
            dest_addr: 127.0.0.1
            headers:
              Host: localhost
              User-Agent: Mozilla/5.0
              Content-Type: application/x-www-form-urlencoded
              X-Forwarded-For: 203.0.113.77
            port: 80
            method: POST
            uri: /wp-login.php
            data: log=admin&pwd=wrong3
          output:
